name: Deploy to Staging

on:
  push:
    branches: [main]

jobs:
  server-tests:
    if: "!contains(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('server/**/packages.lock.json', 'server/**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore B1ngo.slnx
        working-directory: server

      - name: Build
        run: dotnet build B1ngo.slnx --no-restore --configuration Release
        working-directory: server

      - name: Test
        run: dotnet test B1ngo.slnx --no-build --configuration Release --verbosity normal
        working-directory: server

  client-setup:
    if: "!contains(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

  client-app-tests:
    if: "!contains(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    needs: client-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Test
        run: npx ng test b1ngo --watch=false
        working-directory: client/apps/b1ngo

  design-system-tests:
    if: "!contains(github.event.head_commit.message, 'chore: release v')"
    runs-on: ubuntu-latest
    needs: client-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Test
        run: npx ng test --watch=false
        working-directory: client/packages/bng-ui

  version:
    runs-on: ubuntu-latest
    needs: [server-tests, client-app-tests, design-system-tests]
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
        working-directory: client/apps/b1ngo

  migrate-staging:
    runs-on: ubuntu-latest
    needs: server-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('server/**/packages.lock.json', 'server/**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore B1ngo.slnx
        working-directory: server

      - name: Install EF tool
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        env:
          ConnectionStrings__Database: ${{ secrets.NEON_STAGING_CONNECTION_STRING }}
        run: dotnet ef database update --project src/B1ngo.Infrastructure --startup-project src/B1ngo.Web
        working-directory: server

  deploy-api-staging:
    runs-on: ubuntu-latest
    needs: migrate-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service b1ngo-api-staging --detach

  deploy-spa-staging:
    runs-on: ubuntu-latest
    needs: [version, client-app-tests, design-system-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npx ng build --configuration staging
        working-directory: client/apps/b1ngo

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist/b1ngo/browser --project-name b1ngo --branch staging
        working-directory: client/apps/b1ngo
