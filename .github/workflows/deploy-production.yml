name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to HEAD of main)"
        required: false
        default: ""

jobs:
  client-setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

  client-app-tests:
    runs-on: ubuntu-latest
    needs: client-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Build
        run: npx ng build --configuration production
        working-directory: client/apps/b1ngo

      - name: Test
        run: npx ng test b1ngo --watch=false
        working-directory: client/apps/b1ngo

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: spa-production-build
          path: client/apps/b1ngo/dist/b1ngo/browser
          retention-days: 1

  design-system-tests:
    runs-on: ubuntu-latest
    needs: client-setup
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Test
        run: npx ng test --watch=false
        working-directory: client/packages/bng-ui

  migrate-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('server/**/packages.lock.json', 'server/**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore B1ngo.slnx
        working-directory: server

      - name: Install EF tool
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        env:
          ConnectionStrings__Database: ${{ secrets.NEON_PROD_CONNECTION_STRING }}
        run: dotnet ef database update --project src/B1ngo.Infrastructure --startup-project src/B1ngo.Web
        working-directory: server

  deploy-api-prod:
    runs-on: ubuntu-latest
    needs: migrate-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service b1ngo-api-prod --detach

  deploy-spa-prod:
    runs-on: ubuntu-latest
    needs: [client-app-tests, design-system-tests]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v6
        with:
          name: spa-production-build
          path: dist

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist --project-name b1ngo --branch main
