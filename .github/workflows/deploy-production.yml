name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to HEAD of main)"
        required: false
        default: ""

jobs:
  migrate-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore B1ngo.slnx
        working-directory: server

      - name: Install EF tool
        run: dotnet tool install --global dotnet-ef

      - name: Run migrations
        env:
          ConnectionStrings__Database: ${{ secrets.NEON_PROD_CONNECTION_STRING }}
        run: dotnet ef database update --project src/B1ngo.Infrastructure --startup-project src/B1ngo.Web
        working-directory: server

  deploy-api-prod:
    runs-on: ubuntu-latest
    needs: migrate-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service b1ngo-api-prod --detach
        working-directory: server

  deploy-spa-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha || 'main' }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npx ng build --configuration production
        working-directory: client/apps/b1ngo

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist/b1ngo/browser --project-name b1ngo --branch main
        working-directory: client/apps/b1ngo
