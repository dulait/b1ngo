name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore B1ngo.slnx
        working-directory: server

      - name: Build
        run: dotnet build B1ngo.slnx --no-restore --configuration Release
        working-directory: server

      - name: Format check
        run: dotnet tool restore && dotnet csharpier check .

      - name: Test
        run: dotnet test B1ngo.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
        working-directory: server

      - name: Generate OpenAPI spec
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: dotnet test tests/B1ngo.Web.Tests/B1ngo.Web.Tests.csproj --no-build --configuration Release --filter "FullyQualifiedName=B1ngo.Web.Tests.OpenApiSpecTests.Generate_OpenApi_Spec_File"
        working-directory: server

      - name: Sync to Postman
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_ID: ${{ secrets.POSTMAN_COLLECTION_ID }}
        run: |
          npx openapi-to-postmanv2 -s docs/openapi.v1.json -o /tmp/postman-collection.json -p
          jq '{collection: .}' /tmp/postman-collection.json > /tmp/postman-body.json
          HTTP_CODE=$(curl --silent --output /tmp/postman-response.txt --write-out "%{http_code}" \
            -X PUT \
            "https://api.getpostman.com/collections/${POSTMAN_COLLECTION_ID}" \
            -H "X-Api-Key: ${POSTMAN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/postman-body.json)
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Postman API returned HTTP $HTTP_CODE:"
            cat /tmp/postman-response.txt
            exit 1
          fi
          echo "Postman sync succeeded (HTTP $HTTP_CODE)"

      - name: Commit OpenAPI spec
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/openapi.v1.json
          git diff --cached --quiet || (git commit -m "docs: update openapi spec" && git push)
