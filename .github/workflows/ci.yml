name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore B1ngo.slnx
        working-directory: server

      - name: Build
        run: dotnet build B1ngo.slnx --no-restore --configuration Release
        working-directory: server

      - name: Format check
        run: dotnet tool restore && dotnet csharpier check .

      - name: Test
        run: dotnet test B1ngo.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
        working-directory: server

      - name: Generate OpenAPI spec
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: dotnet test tests/B1ngo.Web.Tests/B1ngo.Web.Tests.csproj --no-build --configuration Release --filter "FullyQualifiedName=B1ngo.Web.Tests.OpenApiSpecTests.Generate_OpenApi_Spec_File"
        working-directory: server

      - name: Sync to Postman
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        run: |
          jq -n --arg spec "$(cat docs/openapi.v1.json)" '{"type": "string", "input": $spec}' | \
          curl --fail --silent \
            -X POST \
            "https://api.getpostman.com/import/openapi" \
            -H "X-Api-Key: ${{ secrets.POSTMAN_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Commit OpenAPI spec
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/openapi.v1.json
          git diff --cached --quiet || (git commit -m "docs: update openapi spec" && git push)
