name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  server-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('server/**/packages.lock.json', 'server/**/*.csproj') }}
          restore-keys: nuget-

      - name: Restore
        run: dotnet restore B1ngo.slnx
        working-directory: server

      - name: Build
        run: dotnet build B1ngo.slnx --no-restore --configuration Release
        working-directory: server

      - name: Format check
        run: dotnet tool restore && dotnet csharpier check .

      - name: Test
        run: dotnet test B1ngo.slnx --no-build --configuration Release --verbosity normal --collect:"XPlat Code Coverage"
        working-directory: server

      - name: Generate OpenAPI spec
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: dotnet test tests/B1ngo.Web.Tests/B1ngo.Web.Tests.csproj --no-build --configuration Release --filter "FullyQualifiedName=B1ngo.Web.Tests.OpenApiSpecTests.Generate_OpenApi_Spec_File"
        working-directory: server

      - name: Sync to Postman
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        continue-on-error: true
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_ID: ${{ secrets.POSTMAN_COLLECTION_ID }}
        run: |
          npx openapi-to-postmanv2 -s docs/openapi.v1.json -o /tmp/postman-collection.json -p
          jq '{collection: .}' /tmp/postman-collection.json > /tmp/postman-body.json
          HTTP_CODE=$(curl --silent --output /tmp/postman-response.txt --write-out "%{http_code}" \
            -X PUT \
            "https://api.getpostman.com/collections/${POSTMAN_COLLECTION_ID}" \
            -H "X-Api-Key: ${POSTMAN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @/tmp/postman-body.json)
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "Postman API returned HTTP $HTTP_CODE:"
            cat /tmp/postman-response.txt
            exit 1
          fi
          echo "Postman sync succeeded (HTTP $HTTP_CODE)"

      - name: Commit OpenAPI spec
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/openapi.v1.json
          git diff --cached --quiet || (git commit -m "docs: update openapi spec" && git push)

  client-setup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Cache node_modules
        uses: actions/cache/save@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

  client-app-tests:
    runs-on: ubuntu-latest
    needs: client-setup

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Lint
        run: npm run lint
        working-directory: client

      - name: Build
        run: npx ng build
        working-directory: client/apps/b1ngo

      - name: Test
        run: npx ng test b1ngo --watch=false
        working-directory: client/apps/b1ngo

  design-system-tests:
    runs-on: ubuntu-latest
    needs: client-setup

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Test
        run: npx ng test --watch=false
        working-directory: client/packages/bng-ui

  e2e-tests:
    runs-on: ubuntu-latest
    needs: [server-tests, client-app-tests, design-system-tests]

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: b1ngo_test
          POSTGRES_USER: b1ngo
          POSTGRES_PASSWORD: b1ngo
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U b1ngo -d b1ngo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: NuGet cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('server/**/packages.lock.json', 'server/**/*.csproj') }}
          restore-keys: nuget-

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Restore node_modules
        uses: actions/cache/restore@v5
        with:
          path: client/node_modules
          key: node-modules-${{ hashFiles('client/package-lock.json') }}

      - name: Build server
        run: dotnet build B1ngo.slnx --configuration Release
        working-directory: server

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: client/apps/b1ngo

      - name: Start API server
        run: |
          dotnet run --project src/B1ngo.Web/B1ngo.Web.csproj --no-build --configuration Release &
        working-directory: server
        env:
          ASPNETCORE_ENVIRONMENT: Testing
          ASPNETCORE_URLS: "http://localhost:5141"
          ConnectionStrings__Database: "Host=localhost;Port=5434;Database=b1ngo_test;Username=b1ngo;Password=b1ngo"

      - name: Wait for API server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5141/health && exit 0
            sleep 2
          done
          echo "API server failed to start"
          exit 1

      - name: Seed reference data
        run: dotnet run --project tools/B1ngo.DataSync/B1ngo.DataSync.csproj --no-build --configuration Release
        working-directory: server
        env:
          ConnectionStrings__Database: "Host=localhost;Port=5434;Database=b1ngo_test;Username=b1ngo;Password=b1ngo"

      - name: Run Playwright tests
        run: npx playwright test --config=e2e/playwright.config.ts
        working-directory: client/apps/b1ngo
        env:
          CI: "true"
          API_BASE_URL: "http://localhost:5141"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/apps/b1ngo/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: client/apps/b1ngo/test-results/
          if-no-files-found: ignore
          retention-days: 14
