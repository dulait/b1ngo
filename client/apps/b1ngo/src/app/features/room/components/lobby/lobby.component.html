<main class="p-4 space-y-4" [class.pb-24]="store.isHost()">
  <bng-code-input mode="display" [value]="store.joinCode()" />

  <bng-card header="Your Card">
    @if (store.currentCard(); as card) {
      <bng-matrix
        [cells]="gridCells()"
        [matrixSize]="store.matrixSize()"
        mode="edit"
        [winningCells]="emptySet"
        (squareEdit)="onSquareEdit($event)"
      />
    }
  </bng-card>

  <bng-card [header]="'Players (' + store.players().length + ')'">
    <bng-player-list [players]="store.playerChipItems()" />
  </bng-card>
</main>

@if (store.isHost()) {
  <div
    class="fixed bottom-0 left-0 right-0 bg-bg-surface border-t border-border-default p-4 pb-[calc(1rem+env(safe-area-inset-bottom))]"
  >
    <bng-button
      variant="primary"
      size="lg"
      [fullWidth]="true"
      [loading]="isStarting()"
      [disabled]="offline()"
      (clicked)="onStartGame()"
    >
      Start Game
    </bng-button>
  </div>
}

<bng-bottom-sheet title="Edit Square" [open]="editSheetOpen()" (closed)="onEditSheetClosed()">
  <div class="space-y-4">
    <p class="text-sm text-text-secondary">{{ editingSquareCurrentText() }}</p>

    <!-- todo (04.04.2026): uncomment this when we have api marking enabled -->
    <!-- @if (editingSquareHasEventKey()) {
      <p class="text-xs text-warning">
        This square is linked to an auto-event. Editing will make it a custom square that won't be
        auto-marked.
      </p>
    } -->

    <bng-input
      label="New text"
      placeholder="Enter text for this square"
      [maxlength]="50"
      [value]="editingSquareText()"
      (valueChange)="editingSquareText.set($event)"
    />

    <div class="flex gap-3">
      <bng-button variant="secondary" [fullWidth]="true" (clicked)="onEditSheetClosed()">
        Cancel
      </bng-button>
      <bng-button
        variant="primary"
        [fullWidth]="true"
        [loading]="editingSaving()"
        (clicked)="onSaveSquareEdit()"
      >
        Save
      </bng-button>
    </div>
  </div>
</bng-bottom-sheet>
