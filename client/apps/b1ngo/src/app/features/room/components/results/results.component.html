<main class="p-4 space-y-4">
  <div class="text-center py-6">
    <p
      class="text-[1.5rem] font-bold leading-[1.25] tracking-[-0.01em] text-text-primary mb-2"
    >
      Game Over
    </p>
    @if (currentRank(); as rank) {
      <p
        class="text-[1.875rem] font-bold leading-[1.2] tracking-[-0.02em] text-success"
      >
        You finished #{{ rank }}!
      </p>
    }
  </div>

  <bng-card header="Final Standings">
    <bng-leaderboard
      [entries]="store.leaderboardItems()"
      variant="full"
      emptyText="No winners."
    />
  </bng-card>

  @if (store.currentCard(); as card) {
    <bng-card header="Your Card">
      <bng-matrix
        [cells]="gridCells()"
        [matrixSize]="store.matrixSize()"
        mode="readonly"
        [winningCells]="winningSquares()"
      />
    </bng-card>
  }

  <div class="space-y-3">
    <bng-button
      variant="primary"
      size="lg"
      [fullWidth]="true"
      (clicked)="onNewRoom()"
    >
      New Room
    </bng-button>
    <bng-button
      variant="secondary"
      [fullWidth]="true"
      (clicked)="onShareResult()"
    >
      Share Result
    </bng-button>
  </div>
</main>
