<main class="p-4 space-y-4" [class.pb-24]="store.isHost()">
  @if (store.currentCard(); as card) {
    <bng-matrix
      [cells]="gridCells()"
      [matrixSize]="store.matrixSize()"
      mode="interactive"
      [winningCells]="winningSquares()"
      (squareMark)="onSquareMark($event)"
      (squareUnmark)="onSquareUnmark($event)"
    />
  }

  <bng-card header="Winners" data-testid="game-leaderboard">
    <bng-leaderboard
      [entries]="store.leaderboardItems()"
      variant="compact"
    />
  </bng-card>

  <bng-collapsible
    label="Players"
    [badge]="store.players().length"
    [(expanded)]="playersExpanded"
    data-testid="game-players"
  >
    <bng-card>
      <bng-player-list
        [players]="store.playerChipItems()"
      />
    </bng-card>
  </bng-collapsible>
</main>

@if (store.isHost()) {
  <div
    class="fixed bottom-0 left-0 right-0 bg-bg-surface border-t border-border-default p-4 pb-[calc(1rem+env(safe-area-inset-bottom))]"
  >
    <bng-button
      data-testid="game-end-game"
      variant="danger"
      size="lg"
      [fullWidth]="true"
      (clicked)="onEndGame()"
    >
      End Game
    </bng-button>
  </div>
}

<bng-bottom-sheet title="End Game?" [open]="endGameSheetOpen()" (closed)="onCancelEndGame()">
  <div class="space-y-4">
    <p class="text-sm text-text-secondary">
      This will end the game for all players. This cannot be undone.
    </p>
    <div class="flex justify-between">
      <bng-button variant="secondary" (clicked)="onCancelEndGame()" data-testid="end-game-cancel">
        Cancel
      </bng-button>
      <bng-button
        data-testid="end-game-confirm"
        variant="danger"
        [loading]="isEnding()"
        (clicked)="onConfirmEndGame()"
      >
        End Game
      </bng-button>
    </div>
  </div>
</bng-bottom-sheet>
