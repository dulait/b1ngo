@if (loading()) {
  <main class="p-4 space-y-4" aria-busy="true">
    <bng-skeleton variant="rect" height="3rem" />
    <bng-card header="Your Card">
      <bng-skeleton variant="matrix" />
    </bng-card>
    <bng-card header="Players">
      <bng-skeleton variant="player-list" />
    </bng-card>
  </main>
} @else if (error()) {
  <main class="p-4">
    <div class="text-center pt-8">
      <p class="text-text-primary text-lg font-semibold mb-2">Can't connect to the server.</p>
      <bng-button variant="primary" (clicked)="retry()">Retry</bng-button>
    </div>
  </main>
} @else {
  <div class="flex items-center justify-between px-4 py-2 bg-bg-base border-b border-border-default">
    <span class="text-sm text-text-secondary">
      {{ store.sessionInfo()?.grandPrixShort }} / {{ store.sessionInfo()?.sessionType }}
    </span>
    <bng-status-badge [label]="store.status()!" [variant]="statusVariant()" />
  </div>

  @switch (store.status()) {
    @case ('Lobby') {
      <app-lobby />
    }
    @case ('Active') {
      <app-game />
    }
    @case ('Completed') {
      <app-results />
    }
  }
}
