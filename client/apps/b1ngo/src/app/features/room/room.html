@if (loading()) {
  <bng-header />
  <main class="p-4 space-y-4">
    <bng-skeleton variant="rect" height="3rem" />
    <bng-skeleton variant="matrix" />
    <bng-skeleton variant="player-list" />
  </main>
} @else if (error()) {
  <bng-header />
  <main class="p-4">
    <div class="text-center pt-8">
      <p class="text-text-primary text-lg font-semibold mb-2">Something went wrong</p>
      <p class="text-text-secondary text-sm">{{ error() }}</p>
    </div>
  </main>
} @else {
  <bng-header
    [joinCode]="store.joinCode()"
    [roomStatus]="store.status()"
    [session]="store.uiSession()"
  />

  @switch (store.status()) {
    @case ('Lobby') {
      <app-lobby />
    }
    @case ('Active') {
      <app-game />
    }
    @case ('Completed') {
      <app-results />
    }
  }
}
