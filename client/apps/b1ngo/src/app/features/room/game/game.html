<main class="p-4 space-y-4 pb-24">
  @if (store.currentCard(); as card) {
    <bng-matrix
      [squares]="card.squares"
      [matrixSize]="store.matrixSize()"
      mode="game"
      [currentPlayerId]="store.currentPlayerId()"
      [winningSquares]="winningSquares()"
      (squareMark)="onSquareMark($event)"
      (squareUnmark)="onSquareUnmark($event)"
    />
  }

  <bng-card header="Winners">
    <bng-leaderboard
      [entries]="store.uiLeaderboard()"
      [players]="store.uiPlayers()"
      [currentPlayerId]="store.currentPlayerId()"
      variant="compact"
    />
  </bng-card>

  <bng-collapsible label="Players" [badge]="store.players().length" [(expanded)]="playersExpanded">
    <bng-card>
      <bng-player-list
        [players]="store.uiPlayers()"
        [hostPlayerId]="store.hostPlayerId()"
        [currentPlayerId]="store.currentPlayerId()"
      />
    </bng-card>
  </bng-collapsible>
</main>

@if (store.isHost()) {
  <div
    class="fixed bottom-0 left-0 right-0 bg-bg-surface border-t border-border-default p-4 pb-[calc(1rem+env(safe-area-inset-bottom))]"
  >
    <bng-button
      variant="danger"
      size="lg"
      [fullWidth]="true"
      (clicked)="onEndGame()"
    >
      End Game
    </bng-button>
  </div>
}

<bng-bottom-sheet title="End Game?" [open]="endGameSheetOpen()" (closed)="onCancelEndGame()">
  <div class="space-y-4">
    <p class="text-sm text-text-secondary">
      This will end the game for all players. This cannot be undone.
    </p>
    <div class="flex gap-3">
      <bng-button variant="secondary" [fullWidth]="true" (clicked)="onCancelEndGame()">
        Cancel
      </bng-button>
      <bng-button variant="danger" [fullWidth]="true" [loading]="isEnding()" (clicked)="onConfirmEndGame()">
        End Game
      </bng-button>
    </div>
  </div>
</bng-bottom-sheet>
