<bng-card header="Log In">
  <form (submit)="$event.preventDefault(); onSubmit()" class="space-y-4">
    <bng-input
      label="Email"
      type="email"
      autocomplete="email"
      [value]="email.value()"
      [error]="email.error()"
      (valueChange)="email.set($event)"
    />
    <div>
      <bng-input
        label="Password"
        type="password"
        autocomplete="current-password"
        [value]="password.value()"
        [error]="password.error()"
        (valueChange)="password.set($event)"
      />
      <div class="flex justify-end mt-1.5">
        <a routerLink="/auth/forgot-password" class="text-sm text-accent hover:underline">
          Forgot password?
        </a>
      </div>
    </div>
    <bng-button type="submit" variant="primary" [loading]="loading()" [fullWidth]="true">
      Log In
    </bng-button>
  </form>

  <div class="mt-5 flex items-center gap-3">
    <hr class="flex-1 border-border-default" />
    <span class="text-xs text-text-secondary uppercase tracking-wider">Or continue with</span>
    <hr class="flex-1 border-border-default" />
  </div>

  <div class="mt-4 flex justify-center gap-3">
    <bng-button variant="secondary" (clicked)="onExternalLogin('Google')">
      <span class="flex items-center gap-2">
        <bng-icon [icon]="googleIcon" [viewBox]="socialViewBox" size="sm" />
        Google
      </span>
    </bng-button>
    <bng-button variant="secondary" (clicked)="onExternalLogin('Microsoft')">
      <span class="flex items-center gap-2">
        <bng-icon [icon]="microsoftIcon" [viewBox]="socialViewBox" size="sm" />
        Microsoft
      </span>
    </bng-button>
  </div>

  <p class="mt-4 text-sm text-center text-text-secondary">
    Don't have an account?
    <a routerLink="/auth/register" class="text-accent hover:underline">Register</a>
  </p>
</bng-card>
