@if (success()) {
  <bng-card header="Reset Password">
    <div class="flex flex-col items-center text-center space-y-3 py-2">
      <bng-icon [icon]="checkIcon" size="lg" class="text-success" />
      <h2 class="text-lg font-semibold text-text-primary">Password reset successfully.</h2>
      <p class="text-sm text-text-secondary">
        You can now
        <a routerLink="/auth/login" class="text-accent hover:underline">log in</a>
        with your new password.
      </p>
    </div>
  </bng-card>
} @else {
  <bng-card header="Reset Password">
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <bng-input
        label="New Password"
        type="password"
        autocomplete="new-password"
        [value]="newPassword()"
        [error]="newPasswordError()"
        (valueChange)="onNewPasswordChange($event)"
      />
      <bng-input
        label="Confirm Password"
        type="password"
        autocomplete="new-password"
        [value]="confirmPassword()"
        [error]="confirmPasswordError()"
        (valueChange)="onConfirmPasswordChange($event)"
      />
      <bng-button type="submit" variant="primary" [loading]="loading()" [fullWidth]="true">
        Reset Password
      </bng-button>
    </form>
  </bng-card>
}
