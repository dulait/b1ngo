@if (sent()) {
  <bng-card header="Forgot Password">
    <div class="flex flex-col items-center text-center space-y-3 py-2">
      <bng-icon [icon]="checkIcon" size="lg" class="text-success" />
      <h2 class="text-lg font-semibold text-text-primary">Check your email</h2>
      <p class="text-sm text-text-secondary">
        If an account exists for {{ email() }}, you'll receive a password reset link shortly.
      </p>
      <a routerLink="/auth/login" class="text-sm text-accent hover:underline">Back to Log in</a>
    </div>
  </bng-card>
} @else {
  <bng-card header="Forgot Password">
    <p class="text-sm text-text-secondary mb-4">
      Enter your email address and we'll send you a link to reset your password.
    </p>
    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <bng-input
        label="Email"
        type="email"
        autocomplete="email"
        [value]="email()"
        [error]="emailError()"
        (valueChange)="onEmailChange($event)"
      />
      <bng-button type="submit" variant="primary" [loading]="loading()" [fullWidth]="true">
        Send Reset Link
      </bng-button>
    </form>
    <p class="mt-4 text-sm text-center text-text-secondary">
      Remember your password?
      <a routerLink="/auth/login" class="text-accent hover:underline">Log in</a>
    </p>
  </bng-card>
}
