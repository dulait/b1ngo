<bng-header />

<main class="flex flex-col p-4 space-y-4 max-w-md mx-auto">
  <create-room-form (success)="onRoomCreated($event)" />

  <join-room-form (success)="onRoomJoined($event)" />

  <div class="pt-2 pb-4">
    <bng-theme-picker
      [currentTheme]="themeService.currentTheme()"
      (themeChange)="themeService.setTheme($event)"
    />
  </div>
</main>
