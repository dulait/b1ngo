<bng-card header="Create Room" data-testid="create-room-card">
  <div class="space-y-4">
    <bng-input
      data-testid="create-room-name"
      label="Your Name"
      placeholder="Enter your display name"
      [value]="hostDisplayName()"
      [error]="nameError()"
      [maxlength]="50"
      (valueChange)="onNameChange($event)"
    />

    <bng-select
      data-testid="create-room-season"
      label="Season"
      [options]="seasonOptions()"
      [value]="season()"
      (valueChange)="onSeasonChange($event)"
    />

    <bng-select
      data-testid="create-room-gp"
      label="Grand Prix"
      [options]="grandPrixOptions()"
      [value]="grandPrixName()"
      [disabled]="!season()"
      placeholder="Select a Grand Prix"
      (valueChange)="onGrandPrixChange($event)"
    />

    <bng-select
      data-testid="create-room-session"
      label="Session Type"
      [options]="sessionTypeOptions()"
      [value]="sessionType()"
      [disabled]="!grandPrixName()"
      placeholder="Select a session type"
      (valueChange)="sessionType.set($event)"
    />

    <div>
      <bng-button
        variant="ghost"
        (clicked)="toggleAdvanced()"
        data-testid="create-room-more-options"
      >
        {{ showAdvanced() ? 'Less options' : 'More options' }}
      </bng-button>

      @if (showAdvanced()) {
        <div class="space-y-4 mt-3">
          <div>
            <span id="card-size-label" class="block text-sm text-text-secondary mb-2"
              >Card Size</span
            >
            <div
              class="flex gap-2"
              role="radiogroup"
              aria-labelledby="card-size-label"
              data-testid="create-room-matrix-sizes"
            >
              @for (size of matrixSizes; track size) {
                <button
                  type="button"
                  class="w-10 h-10 rounded-lg border flex items-center justify-center text-sm cursor-pointer"
                  [class.border-accent]="matrixSize() === size"
                  [class.bg-accent-muted]="matrixSize() === size"
                  [class.text-accent]="matrixSize() === size"
                  [class.font-semibold]="matrixSize() === size"
                  [class.border-border-default]="matrixSize() !== size"
                  [class.bg-bg-surface]="matrixSize() !== size"
                  [class.text-text-secondary]="matrixSize() !== size"
                  [attr.data-testid]="'matrix-size-' + size"
                  (click)="setMatrixSize(size)"
                >
                  {{ size }}
                </button>
              }
            </div>
          </div>

          <div>
            <span id="win-patterns-label" class="block text-sm text-text-secondary mb-2"
              >Win Patterns</span
            >
            <bng-pill-toggle
              data-testid="create-room-win-patterns"
              [options]="winningPatterns()"
              ariaLabel="Win patterns"
              (toggled)="onPatternToggled($event)"
            />
          </div>
        </div>
      }
    </div>

    <bng-button
      data-testid="create-room-submit"
      variant="primary"
      size="lg"
      [fullWidth]="true"
      [loading]="loading()"
      [disabled]="
        !season() || !grandPrixName() || !sessionType() || !hostDisplayName().trim() || loading()
      "
      type="submit"
      (clicked)="onSubmit()"
    >
      Create Room
    </bng-button>
  </div>
</bng-card>
