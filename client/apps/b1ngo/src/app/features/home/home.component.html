<main class="flex flex-col p-4 space-y-4 max-w-md mx-auto">
  @if (auth.isAuthenticated()) {
    <div class="flex items-center justify-between">
      <span class="text-sm text-zinc-300">Welcome, {{ auth.currentUser()?.displayName }}</span>
      <button
        class="text-sm text-amber-400 hover:underline cursor-pointer"
        (click)="onLogout()"
      >
        Log out
      </button>
    </div>
  } @else {
    <div class="flex items-center justify-end gap-3">
      <a routerLink="/auth/login" class="text-sm text-amber-400 hover:underline">Log in</a>
      <a routerLink="/auth/register" class="text-sm text-amber-400 hover:underline">Register</a>
    </div>
  }
  <create-room-form [defaultDisplayName]="defaultDisplayName" (success)="onRoomCreated($event)" />
  <join-room-form [defaultDisplayName]="defaultDisplayName" (success)="onRoomJoined($event)" />
</main>
